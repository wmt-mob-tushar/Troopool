<style>
:root{--bg:#F1F0F8;--paper:#FFFFFF;--soft:#ECEAF6;--ink:#181826;--ink-2:#54566B;--brand:#5B4BD6;--coral:#FF6A4D;--lime:#CBF24E;--line:#E6E3F1;
 --d:'Bricolage Grotesque',sans-serif;--b:'Hanken Grotesk',sans-serif;--m:'JetBrains Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--b);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}
nav{position:sticky;top:0;z-index:50;background:rgba(241,240,248,.85);backdrop-filter:blur(18px) saturate(1.4);border-bottom:1px solid var(--line)}
nav .in{max-width:1100px;margin:0 auto;padding:0 22px;height:58px;display:flex;align-items:center;gap:16px}
.logo{font-family:var(--d);font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
.logo i{width:12px;height:12px;border-radius:50% 50% 50% 3px;background:var(--coral);transform:rotate(8deg);box-shadow:0 0 0 4px rgba(255,106,77,.2)}
.actions{margin-left:auto;display:flex;gap:10px}
.btn{font-size:13px;font-weight:700;text-decoration:none;padding:9px 15px;border-radius:10px}
.btn.ghost{color:var(--ink);background:var(--soft)}
.btn.solid{color:#fff;background:var(--brand)}
.docnav{background:var(--paper);border-bottom:1px solid var(--line)}
.docnav .in{max-width:1100px;margin:0 auto;padding:9px 22px;display:flex;gap:6px;overflow-x:auto}
.docnav a{font-size:12.5px;font-weight:600;color:var(--ink-2);text-decoration:none;padding:7px 12px;border-radius:9px;white-space:nowrap;transition:.15s}
.docnav a:hover{background:var(--soft);color:var(--ink)}
.docnav a.on{background:var(--brand);color:#fff}
.viewer{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:18px 22px 28px;display:flex;flex-direction:column}
.frame{flex:1;min-height:78vh;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#16142A;box-shadow:0 20px 50px -30px rgba(24,22,45,.5)}
.frame embed,.frame iframe{width:100%;height:100%;border:0;display:block}
.fallback{font-size:13px;color:var(--ink-2);margin-top:12px;text-align:center}
.fallback a{color:var(--brand);font-weight:700}
</style>
</head>
<body>

</div></div>

</div>
</body>
