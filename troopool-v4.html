<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Troopool v4 — the network is the product</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ===== Troopool v3 "Connect" theme — indigo primary · coral action · teal trust/rides · lime success ===== */
:root{
  --bg:#F1F0F8;--paper:#FFFFFF;--soft:#ECEAF6;--ink:#181826;--ink-2:#54566B;--ink-3:#8E90A6;
  --brand:#5B4BD6;--brand-d:#4A3BC0;--brand-soft:#ECEAFB;--brand-2:#7C6CF0;
  --coral:#FF6A4D;--coral-d:#E85535;--coral-soft:#FFE7E1;
  --teal:#10A88F;--teal-d:#0C8A75;--teal-soft:#DCF3EE;
  --lime:#CBF24E;--gold:#C2961E;--silver:#8A8F96;--bronze:#AE7644;
  --line:#E9E7F2;--line-2:#DBD8EA;--ok:#10A88F;
  --g-brand:linear-gradient(135deg,#6E5DEC,#4A39C4);--g-coral:linear-gradient(135deg,#FF8064,#F04E2C);--g-teal:linear-gradient(135deg,#18BFA4,#0B8773);--g-ink:linear-gradient(135deg,#2B2942,#15151F);
  --sh-1:0 1px 2px rgba(24,22,45,.05);--sh-2:0 2px 6px rgba(24,22,45,.05),0 14px 30px -18px rgba(24,22,45,.22);--sh-3:0 18px 40px -20px rgba(24,22,45,.32);
  --d:'Bricolage Grotesque',sans-serif;--b:'Hanken Grotesk',sans-serif;--m:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--b);color:var(--ink);display:flex;align-items:center;justify-content:center;gap:44px;min-height:100vh;padding:28px 16px;flex-wrap:wrap;
  background:#16142A;background-image:radial-gradient(circle at 20% 10%,#332C66,transparent 52%),radial-gradient(circle at 86% 90%,#3C1C46,transparent 48%),radial-gradient(circle at 92% 8%,#1B3A57,transparent 44%)}
::selection{background:var(--lime)}

/* side guide */
.aside{width:300px;max-width:300px;color:#CFCBDD}
.aside .logo{font-family:var(--d);font-weight:800;font-size:24px;color:#fff;display:flex;align-items:center;gap:9px;letter-spacing:-.02em}
.aside .logo i{width:15px;height:15px;border-radius:50% 50% 50% 4px;background:var(--coral);transform:rotate(8deg);box-shadow:0 0 0 4px rgba(255,106,77,.25)}
.aside-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:16px;margin-top:15px}
.aside .k{font-family:var(--m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--lime);display:block;margin-bottom:8px}
.aside p{font-size:12.5px;line-height:1.55;color:#AAA7BC;margin:0}
.steps{list-style:none;display:flex;flex-direction:column}
.steps li{display:flex;gap:11px;font-size:12px;color:#C2BFD2;line-height:1.4;padding:9px 0;border-top:1px solid rgba(255,255,255,.07)}
.steps li:first-child{border-top:none;padding-top:2px}
.steps .n{flex:0 0 auto;width:24px;height:24px;border-radius:8px;background:rgba(203,242,78,.14);color:var(--lime);font-family:var(--m);font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center}
.steps em{font-style:normal;color:#fff;font-weight:600;background:rgba(255,255,255,.09);padding:1px 6px;border-radius:5px}

/* device */
.device{position:relative;width:390px;height:844px;background:#0b0c12;border-radius:56px;padding:13px;flex:0 0 auto;
  box-shadow:0 0 0 2px #3a3850,0 0 0 13px #14131c,0 50px 90px -30px rgba(0,0,0,.8)}
.device .bl{position:absolute;left:-3px;top:215px;width:3px;height:62px;background:#26243a;border-radius:3px}
.device .br{position:absolute;right:-3px;top:200px;width:3px;height:90px;background:#26243a;border-radius:3px}
.viewport{position:relative;width:100%;height:100%;background:var(--bg);border-radius:44px;overflow:hidden}
.island{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:118px;height:33px;background:#000;border-radius:20px;z-index:95}
.statusbar{position:absolute;top:0;left:0;right:0;height:54px;z-index:90;display:flex;align-items:center;justify-content:space-between;
  padding:18px 30px 0;font-family:var(--m);font-weight:700;font-size:14px;color:var(--ink);pointer-events:none;transition:color .35s}
.statusbar .r{display:flex;align-items:center;gap:6px}
.device.bar-light .statusbar{color:#fff}
.homebar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:5px;background:var(--ink);opacity:.85;z-index:95;transition:background .35s}
.device.bar-light .homebar{background:#fff}

/* screens + transitions */
.stage{position:absolute;inset:0}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);
  background-image:radial-gradient(circle at -5% 0%,rgba(91,75,214,.07),transparent 36%),radial-gradient(circle at 105% 10%,rgba(255,106,77,.055),transparent 34%),radial-gradient(circle at 50% 108%,rgba(16,168,143,.055),transparent 42%);
  transform:translateX(100%);opacity:0;pointer-events:none;transition:transform .34s cubic-bezier(.32,.72,0,1),opacity .34s;will-change:transform}
.screen.active{transform:translateX(0);opacity:1;pointer-events:auto;z-index:10}
.screen.past{transform:translateX(-24%);opacity:.5;pointer-events:none;z-index:5}
@media(prefers-reduced-motion:reduce){.screen{transition:opacity .2s}.screen,.screen.past{transform:none}}
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.body::-webkit-scrollbar{width:0}
.pt{padding-top:54px}.px{padding-left:20px;padding-right:20px}.pb{padding-bottom:24px}
.navbar{height:50px;display:flex;align-items:center;gap:6px;padding:0 12px;flex:0 0 auto;margin-top:54px}
.iconbtn{width:44px;height:44px;border-radius:50%;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);transition:background .15s}
.iconbtn:active{background:rgba(0,0,0,.06)}
.navbar .ttl{font-family:var(--d);font-weight:700;font-size:17px}

/* atoms */
.eyebrow{font-family:var(--m);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
.h1{font-family:var(--d);font-weight:700;letter-spacing:-.025em;line-height:1.05;font-size:27px}
.h2{font-family:var(--d);font-weight:700;letter-spacing:-.02em;font-size:20px}
.muted{color:var(--ink-2)}.tnum{font-family:var(--m);font-weight:700}
.btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;min-height:52px;border-radius:16px;border:none;
  font-family:var(--b);font-weight:700;font-size:15px;cursor:pointer;transition:transform .12s,background .2s}
.btn:active{transform:scale(.975)}
.btn>svg{width:19px;height:19px;flex:0 0 auto}
.iconbtn>svg{width:24px;height:24px;flex:0 0 auto}
.btn{box-shadow:inset 0 1px 0 rgba(255,255,255,.16)}
.btn-brand{background:var(--g-brand);color:#fff;box-shadow:0 12px 26px -10px rgba(91,75,214,.6),inset 0 1px 0 rgba(255,255,255,.22)}
.btn-coral{background:var(--g-coral);color:#fff;box-shadow:0 12px 26px -10px rgba(255,106,77,.6),inset 0 1px 0 rgba(255,255,255,.24)}
.btn-teal{background:var(--g-teal);color:#fff;box-shadow:0 12px 26px -12px rgba(16,168,143,.55),inset 0 1px 0 rgba(255,255,255,.2)}
.btn-ink{background:var(--g-ink);color:#fff;box-shadow:0 12px 26px -14px rgba(24,22,45,.7)}
.btn-ghost{background:rgba(255,255,255,.55);border:1.5px solid var(--line-2);color:var(--ink);box-shadow:none;backdrop-filter:blur(6px)}
.cta-dock{padding:12px 20px calc(20px + env(safe-area-inset-bottom));flex:0 0 auto;background:linear-gradient(180deg,transparent,var(--bg) 32%)}
.card{background:var(--paper);border:1px solid rgba(24,22,45,.05);border-radius:20px;padding:15px;box-shadow:var(--sh-2)}
.row{display:flex;align-items:center;gap:11px}.between{display:flex;align-items:center;justify-content:space-between}
.spacer{flex:1}.hr{height:1px;background:var(--line);margin:13px 0}
.av{border-radius:14px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-family:var(--d);font-weight:700;color:#fff;width:46px;height:46px;font-size:17px;box-shadow:0 6px 14px -6px rgba(24,22,45,.4)}
.field{background:var(--paper);border:1.5px solid var(--line);border-radius:15px;padding:13px 15px;display:flex;align-items:center;gap:11px;margin-bottom:11px;box-shadow:var(--sh-1)}
.field .ic{width:21px;flex:0 0 auto;color:var(--brand)}
.lab{font-family:var(--m);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3)}
.val{font-size:14.5px;font-weight:600}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:7px 12px;border-radius:999px;background:var(--soft);color:var(--ink-2);cursor:pointer;border:1px solid transparent;transition:.15s}
.chip:active{transform:scale(.95)}
.chip.brand,.chip.on{background:var(--g-brand);color:#fff;border-color:transparent}.chip.brand-soft{background:var(--brand-soft);color:var(--brand)}
.chip.coral{background:var(--g-coral);color:#fff;border-color:transparent}.chip.teal{background:var(--g-teal);color:#fff;border-color:transparent}
.chip.lime{background:var(--lime);color:var(--ink);border-color:transparent}
.chip.out{background:transparent;border-color:var(--line-2);color:var(--ink-2)}
.vok{font-family:var(--m);font-size:10px;font-weight:700;color:var(--teal);display:inline-flex;align-items:center;gap:4px}
.tier{font-family:var(--m);font-size:9.5px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.tier::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor}
.tier.gold{color:var(--gold)}.tier.silver{color:var(--silver)}.tier.bronze{color:var(--bronze)}
.desig{font-size:12px;color:var(--ink-2);font-weight:600}
.stars{color:var(--gold);font-size:12px}
.why{display:inline-flex;align-items:center;gap:5px;font-family:var(--m);font-size:10px;font-weight:700;padding:4px 9px;border-radius:8px}
.why.way{background:var(--teal-soft);color:var(--teal-d)}.why.near{background:#FBEEDD;color:var(--bronze)}.why.wave{background:var(--brand-soft);color:var(--brand)}
.ringnum{font-family:var(--m);font-weight:700;fill:var(--ink)}
.seg{display:flex;background:var(--soft);border-radius:15px;padding:4px;gap:3px}
.seg button{flex:1;border:none;background:transparent;font-family:var(--b);font-weight:700;font-size:12.5px;min-height:42px;border-radius:12px;cursor:pointer;color:var(--ink-2);transition:.2s}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 6px 16px -9px rgba(24,22,45,.45),inset 0 0 0 1px rgba(24,22,45,.03)}
.seg.brand button.on{background:var(--g-brand);color:#fff;box-shadow:0 8px 18px -8px rgba(91,75,214,.55)}
.bar{height:9px;border-radius:6px;background:var(--soft);overflow:hidden}.bar>span{display:block;height:100%;background:var(--teal);border-radius:6px}
.day{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:1.6px solid var(--line-2);color:var(--ink-3)}
.day.on{background:var(--teal);border-color:var(--teal);color:#fff}
.mlegend{display:flex;gap:13px;flex-wrap:wrap;font-family:var(--m);font-size:10px;color:var(--ink-2)}
.mlegend i{width:14px;height:4px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:4px}

/* map */
.map{position:relative;background:linear-gradient(150deg,#E7EEEA,#D9E6E0);overflow:hidden}
.pin{position:absolute;font-family:var(--m);font-size:9.5px;font-weight:700;background:var(--ink);color:#fff;padding:4px 8px;border-radius:8px;transform:translate(-50%,-50%);white-space:nowrap}
.pin.c{background:var(--coral)}.carmark{position:absolute;transform:translate(-50%,-50%);background:#fff;padding:5px 10px;border-radius:11px;font-family:var(--m);font-size:10px;font-weight:700;box-shadow:0 8px 20px -10px rgba(0,0,0,.5)}
.walk{position:absolute;transform:translate(-50%,-50%);background:#fff;color:var(--ink);font-family:var(--m);font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px;border:1px solid var(--line);white-space:nowrap}

/* deck */
.deck{position:relative;height:418px;margin-top:8px}
.deckcard{position:absolute;inset:0;border-radius:26px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:0 26px 50px -24px rgba(0,0,0,.45);color:#fff}
.deckcard .grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 35%,rgba(15,12,30,.92));z-index:1}
.deckcard .info{position:relative;z-index:2;padding:20px}.deckcard .nm{font-family:var(--d);font-weight:700;font-size:24px}
.deckact{display:flex;gap:14px;justify-content:center;margin-top:16px}
.deckbtn{width:60px;height:60px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s;box-shadow:0 12px 26px -12px rgba(0,0,0,.5)}
.deckbtn:active{transform:scale(.9)}.deckbtn.skip{background:#fff;color:var(--ink-2)}.deckbtn.like{background:var(--brand);color:#fff;width:68px;height:68px}

/* tabbar */
.tabbar{height:76px;flex:0 0 auto;border-top:1px solid rgba(24,22,45,.06);background:rgba(255,255,255,.78);backdrop-filter:blur(22px) saturate(1.5);display:flex;align-items:flex-start;justify-content:space-around;padding:9px 6px 0}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9.5px;font-weight:600;color:var(--ink-3);background:none;border:none;cursor:pointer;min-width:56px;min-height:44px}
.tab svg{width:23px;height:23px;transition:.2s}.tab.on{color:var(--brand)}.tab.on svg{filter:drop-shadow(0 5px 9px rgba(91,75,214,.42));transform:translateY(-1px)}

/* sheet + toast */
.scrim{position:absolute;inset:0;background:rgba(20,18,30,.5);opacity:0;pointer-events:none;transition:.3s;z-index:60}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--paper);border-radius:28px 28px 0 0;padding:10px 20px calc(26px + env(safe-area-inset-bottom));
  transform:translateY(102%);transition:transform .36s cubic-bezier(.32,.72,0,1);z-index:70;box-shadow:0 -20px 50px -20px rgba(0,0,0,.4)}
.sheet.show{transform:translateY(0)}
.grab{width:40px;height:5px;border-radius:5px;background:var(--line-2);margin:4px auto 14px}
.toast{position:absolute;left:18px;right:18px;bottom:92px;background:var(--ink);color:#fff;padding:13px 16px;border-radius:15px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;z-index:80;opacity:0;transform:translateY(12px);transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:none}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.pulse{position:relative}.pulse::after{content:"";position:absolute;inset:0;border-radius:inherit;border:2px solid var(--coral);animation:pg 1.6s ease-out infinite}
@keyframes pg{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.7);opacity:0}}
@media(max-width:1160px){.aside{display:none}}

/* ===== Figma-style comments ===== */
#cLayer{position:absolute;inset:0;z-index:80;pointer-events:none}
#cLayer.on{pointer-events:auto;cursor:crosshair}
.cpin{position:absolute;transform:translate(-3px,-100%);width:30px;height:30px;border-radius:50% 50% 50% 5px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;font-family:var(--m);box-shadow:0 5px 14px rgba(0,0,0,.45);cursor:pointer;pointer-events:auto;border:2px solid #fff;transition:transform .14s;animation:pop .2s ease-out}
.cpin:hover{transform:translate(-3px,-100%) scale(1.14);z-index:2}
.cpin.sel{transform:translate(-3px,-100%) scale(1.14);box-shadow:0 0 0 3px rgba(255,255,255,.55),0 6px 16px rgba(0,0,0,.5)}
.cpin.res{opacity:.4}
.cpin .rc{position:absolute;right:-3px;top:-4px;width:13px;height:13px;border-radius:50%;background:var(--lime);color:#0E0D18;font-size:8px;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;font-weight:800}

/* right panel */
.cpanel{width:322px;max-width:322px;display:flex;flex-direction:column;height:844px;color:#CFCBDD;font-family:var(--b)}
.cpanel .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.cpanel .ct{font-family:var(--d);font-weight:800;font-size:21px;color:#fff;display:flex;align-items:center;gap:9px;letter-spacing:-.02em}
.cpanel .ct .dot{width:9px;height:9px;border-radius:50%;background:#3a3850;transition:.3s}
.cpanel .ct .dot.live{background:var(--lime);box-shadow:0 0 0 4px rgba(203,242,78,.18);animation:pg2 2s ease-out infinite}
@keyframes pg2{0%{box-shadow:0 0 0 0 rgba(203,242,78,.4)}100%{box-shadow:0 0 0 7px rgba(203,242,78,0)}}
.cbadge{font-family:var(--m);font-size:11px;color:#0E0D18;background:var(--lime);font-weight:700;border-radius:20px;padding:3px 10px}
.cpanel .glass{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:13px;margin-bottom:11px}
.cpanel .lbl{font-family:var(--m);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--lime);display:block;margin-bottom:9px}
.merow{display:flex;align-items:center;gap:10px}
.pav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex:0 0 auto;background:#5B4BD6}
.meinput{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:8px 11px;color:#fff;font-family:var(--b);font-size:13.5px;outline:none}
.meinput:focus{border-color:var(--lime)}
.meinput::placeholder{color:#8A879C}
.swatches{display:flex;gap:7px;margin-top:11px}
.swatches i{width:21px;height:21px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.12s}
.swatches i.on{border-color:#fff;transform:scale(1.12)}
.cmode{width:100%;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:13px 14px;color:#CFCBDD;font-family:var(--b);font-size:14px;font-weight:600;cursor:pointer;transition:.16s;margin-bottom:11px}
.cmode:hover{background:rgba(255,255,255,.09)}
.cmode.on{background:var(--lime);border-color:var(--lime);color:#10120A}
.cmode .ci{width:18px;height:18px;display:block;flex:0 0 auto}
.cmode #cmodeLbl{flex:1;text-align:left}
.cmode .kbd{font-family:var(--m);font-size:10px;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,.12);color:inherit}
.cmode.on .kbd{background:rgba(0,0,0,.14)}
.cfilter{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;min-height:28px}
.presence{display:flex;align-items:center}
.pav.sm{width:27px;height:27px;border:2px solid #16142A;margin-left:-8px;font-size:11px}
.pav.sm:first-child{margin-left:0}
.pmore{font-size:11px;color:#9C99AE;margin-left:7px;font-family:var(--m)}
.resw{display:flex;align-items:center;gap:7px;font-size:12px;color:#9C99AE;cursor:pointer;user-select:none}
.resw input{accent-color:var(--lime);width:14px;height:14px}
.cthreads{flex:1;overflow:auto;display:flex;flex-direction:column;gap:9px;padding-right:3px;margin:0 -3px 11px 0}
.cthreads::-webkit-scrollbar{width:5px}.cthreads::-webkit-scrollbar-thumb{background:rgba(255,255,255,.13);border-radius:4px}
.cempty{text-align:center;color:#7E7B90;font-size:12.5px;padding:34px 14px;line-height:1.6}
.cempty b{color:#B6B3C6;display:block;margin-bottom:4px;font-size:13px}
.cthread{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:11px 12px;cursor:pointer;transition:.14s}
.cthread:hover{background:rgba(255,255,255,.09);border-color:rgba(203,242,78,.35)}
.cthread.res{opacity:.5}
.cthread .crow{display:flex;align-items:center;gap:9px}
.cpin-mini{width:23px;height:23px;border-radius:50% 50% 50% 4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex:0 0 auto;font-family:var(--m)}
.cthread .cwho{font-weight:700;font-size:13px;color:#fff}
.cthread .cmeta{font-size:11px;color:#8E8BA0;font-family:var(--m);margin-left:auto;flex:0 0 auto}

function ensure(id){if(elements[id])return elements[id];const el=document.createElement('div');el.className='screen';el.id='s-'+id;el.innerHTML=SCREENS[id].html;stage.appendChild(el);elements[id]=el;return el;}
function ensureDyn(id){if(elements['tab-'+id])return elements['tab-'+id];const el=document.createElement('div');el.className='screen';el.id='s-tab-'+id;stage.appendChild(el);elements['tab-'+id]=el;return el;}
function rebuildTab(id){const el=ensureDyn(id);el.innerHTML=TABS[id]();return el;}
function setBar(m){device.classList.toggle('bar-light',m==='light');}
function entryEl(e){return e.isTab?rebuildTab(e.id.slice(4)):ensure(e.id);}
function entryBar(e){return e.isTab?TAB_BAR[e.id.slice(4)]:SCREENS[e.id].bar;}
function place(el,s){el.style.transition='none';el.classList.remove('active','past');if(s==='left')el.classList.add('past');else if(s==='center')el.classList.add('active');void el.offsetWidth;el.style.transition='';}
function slide(el,s){el.classList.remove('active','past');if(s==='left')el.classList.add('past');else if(s==='center')el.classList.add('active');}
function render(e,dir){const inEl=entryEl(e);fillDynamic(e);const outEl=document.querySelector('.screen.active');
  if(outEl&&outEl!==inEl){if(dir==='back'){place(inEl,'left');slide(inEl,'center');slide(outEl,'right');}else{place(inEl,'right');slide(inEl,'center');slide(outEl,'left');}}else place(inEl,'center');
  setBar(entryBar(e));}
function fillDynamic(e){try{_fill(e);}catch(err){console.error('fill',e.id,err);}}
function _fill(e){if(e.isTab)return;const id=e.id;
  if(id==='person')elements.person.innerHTML=personHTML(CTX.person);
  else if(id==='verify')elements.verify.innerHTML=verifyHTML();
  else if(id==='match')elements.match.innerHTML=matchHTML(CTX.person);
  else if(id==='chat')elements.chat.innerHTML=chatHTML();
  else if(id==='detail')elements.detail.innerHTML=detailHTML();
  else if(id==='myrides')elements.myrides.innerHTML=myridesHTML();
  else if(id==='circle')elements.circle.innerHTML=circleHTML(CTX.circle);
  else if(id==='circleChat')elements.circleChat.innerHTML=circleChatHTML(CTX.circle);
  else if(id==='plans')elements.plans.innerHTML=plansHTML();
  else if(id==='myplans')elements.myplans.innerHTML=myplansHTML();
  else if(id==='planNew')elements.planNew.innerHTML=planNewHTML();
  else if(id==='planCreated')elements.planCreated.innerHTML=planCreatedHTML();
  else if(id==='neighborDetail')elements.neighborDetail.innerHTML=neighborDetailHTML();
  else if(id==='wholiked')elements.wholiked.innerHTML=whoLikedHTML();
  else if(id==='deck')elements.deck.innerHTML=deckHTML();}
function push(entry){visited=visited.slice(0,cursor+1);if(visited.length&&visited[visited.length-1].id===entry.id){cursor=visited.length-1;render(entry,'fwd');return;}visited.push(entry);cursor=visited.length-1;render(entry,'fwd');}
function go(id){push({id,isTab:false});}
function switchTab(id){push({id:'tab-'+id,isTab:true});}
function navPrev(){if(cursor<=0)return;cursor--;render(visited[cursor],'back');}
function navNext(){if(cursor>=visited.length-1)return;cursor++;render(visited[cursor],'fwd');}
function back(){navPrev();}
function current(){return cursor>=0?visited[cursor].id:null;}

<!-- ===== Figma-style comments — Supabase realtime ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const Comments=(function(){
  const SB_URL='https://tkoaktahnesjarmnrfnc.supabase.co';
  const SB_KEY='sb_publishable_VuidTqDgr-ZyyvUfTsrMFA_DwXrAdR9';
  const BOARD='troopool-v4';
  const PALETTE=['#5B4BD6','#FF6A4D','#10A88F','#C2961E','#7C6CF0','#E0518A','#2E8BD6','#6BBF3A'];
  const SCRLABEL={splash:'Splash',welcome:'Welcome',login:'Login · Phone',quick:'Quick signup',orbit:'Build your orbit',
    interests:'Interests',verify:'Trust Score',kyc:'KYC · DigiLocker',person:'Profile',match:"It's a match",
    chat:'1:1 Chat',detail:'Carpool detail',myrides:'My rides',offer:'Offer a ride',circle:'Circle',circleChat:'Circle chat',
    plans:'Plans',myplans:'My plans',planNew:'New plan',planCreated:'Plan created',neighborDetail:'Neighbour',
    wholiked:'Who liked you',deck:'Swipe deck'};

  let sb=null, threads=new Map(), mode=false, popEl=null, selId=null, popAnchor=null, presenceMap={}, ready=false, myIp=null, hidden=false;
  let me=loadMe(); const uid=loadUid();

  /* ---------- identity ---------- */
  function loadMe(){try{const m=JSON.parse(localStorage.getItem('tp_cmt_me')||'{}');return{name:m.name||'',color:m.color||PALETTE[0]};}catch(e){return{name:'',color:PALETTE[0]};}}
  function saveMe(){localStorage.setItem('tp_cmt_me',JSON.stringify(me));}
  function loadUid(){let u=sessionStorage.getItem('tp_cmt_uid');if(!u){u='u'+Math.abs(hash(String(performance.now())+':'+navigator.userAgent+':'+history.length)).toString(36)+(visited.length);sessionStorage.setItem('tp_cmt_uid',u);}return u;}
  function hash(s){let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i)|0;}return h;}
  function initial(n){n=(n||'').trim();return n?n[0].toUpperCase():'?';}

  /* ---------- helpers ---------- */
  const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  function curScreen(){try{return current()||'splash';}catch(e){return 'splash';}}
  function scrLabel(id){if(!id)return 'Screen';if(id.indexOf('tab-')===0){id=id.slice(4);return id.charAt(0).toUpperCase()+id.slice(1);}return SCRLABEL[id]||(id.charAt(0).toUpperCase()+id.slice(1));}
  function ago(ts){const s=(Date.now()-new Date(ts).getTime())/1000;if(s<45)return 'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
  function orderedThreads(){return[...threads.values()].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));}
  function numberOf(id){const o=orderedThreads();const i=o.findIndex(t=>t.id===id);return i<0?o.length+1:i+1;}
  function lastCommentAt(t){return t.comments.length?t.comments[t.comments.length-1].created_at:t.created_at;}

  /* ---------- state mutation (idempotent — shared by optimistic + realtime) ---------- */
  function upThread(row){const ex=threads.get(row.id);threads.set(row.id,Object.assign({},ex||{},row,{comments:ex?ex.comments:[]}));}
  function upComment(row){let t=threads.get(row.thread_id);if(!t){t={id:row.thread_id,board:BOARD,screen:'?',x:50,y:50,resolved:false,author:row.author,color:row.color,created_at:row.created_at,comments:[]};threads.set(t.id,t);}if(!t.comments.some(c=>c.id===row.id)){t.comments.push(row);t.comments.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));}}
  function delThread(id){threads.delete(id);if(selId===id)closePop();}
  function delCommentById(id){for(const t of threads.values()){const n=t.comments.length;t.comments=t.comments.filter(c=>c.id!==id);if(t.comments.length!==n)return t;}return null;}

  /* ---------- Supabase ---------- */
  async function init(){
    if(!window.supabase){console.warn('supabase-js not loaded');renderPanel();return;}
    sb=window.supabase.createClient(SB_URL,SB_KEY,{realtime:{params:{eventsPerSecond:8}}});
    const [,ip]=await Promise.all([load(),fetchIp()]);
    myIp=ip;
    subscribe();
    bindUI();
    ready=true;
    renderPanel();renderPins();
    logView();
  }
  async function fetchIp(){
    try{const r=await fetch('https://api.ipify.org?format=json',{cache:'no-store'});return (await r.json()).ip;}
    catch(e){try{const r=await fetch('https://ipapi.co/json/');return (await r.json()).ip;}catch(e2){return null;}}
  }
  async function logView(){
    if(!sb)return;
    try{
      await sb.from('prototype_views').upsert({uid,board:BOARD,name:me.name||'Guest',color:me.color,ip:myIp,user_agent:(navigator.userAgent||'').slice(0,300),screen:curScreen(),last_seen:new Date().toISOString()},{onConflict:'uid'});
      const {count}=await sb.from('prototype_views').select('*',{count:'exact',head:true}).eq('board',BOARD);
      const vt=document.getElementById('vtotal');if(vt&&count!=null)vt.textContent=' · '+count+' total';
    }catch(e){console.warn('logView',e);}
  }
  let _logT=0;
  function touchView(){const now=Date.now();if(now-_logT<4000)return;_logT=now;if(sb)sb.from('prototype_views').update({screen:curScreen(),last_seen:new Date().toISOString(),name:me.name||'Guest',ip:myIp}).eq('uid',uid).then(()=>{},()=>{});}
  async function load(){
    const [{data:ts,error:e1},{data:cs,error:e2}]=await Promise.all([
      sb.from('comment_threads').select('*').eq('board',BOARD),
      sb.from('comments').select('*').eq('board',BOARD)
    ]);
    if(e1||e2){console.warn('load',e1||e2);return;}
    threads=new Map();(ts||[]).forEach(upThread);(cs||[]).forEach(upComment);
  }
  function subscribe(){
    const ch=sb.channel('tp-comments-'+BOARD,{config:{presence:{key:uid}}});
    ch.on('postgres_changes',{event:'*',schema:'public',table:'comment_threads',filter:'board=eq.'+BOARD},p=>{
        if(p.eventType==='DELETE')delThread(p.old.id);else upThread(p.new);
        renderPanel();renderPins();refreshPop();})
      .on('postgres_changes',{event:'*',schema:'public',table:'comments',filter:'board=eq.'+BOARD},p=>{
        if(p.eventType==='DELETE')delCommentById(p.old.id);else upComment(p.new);
        renderPanel();renderPins();refreshPop();})
      .on('presence',{event:'sync'},()=>{presenceMap=ch.presenceState();renderPresence();})
      .subscribe(async st=>{if(st==='SUBSCRIBED')await ch.track({name:me.name,color:me.color,uid,at:curScreen(),ip:myIp});});
    window._cch=ch;
  }
  function trackPresence(){if(window._cch&&window._cch.state==='joined')window._cch.track({name:me.name,color:me.color,uid,at:curScreen(),ip:myIp});}

  /* ---------- writes ---------- */
  async function createThread(x,y,screen,body,cy){
    if(!sb)return;
    const {data:tr,error}=await sb.from('comment_threads').insert({board:BOARD,screen,x,y,cy,author:me.name||'Guest',color:me.color}).select().single();
    if(error){toast('Could not post — check connection');return null;}
    upThread(tr);
    const {data:c}=await sb.from('comments').insert({thread_id:tr.id,board:BOARD,author:me.name||'Guest',color:me.color,body}).select().single();
    if(c)upComment(c);
    renderPanel();renderPins();
    return tr.id;
  }
  async function addReply(threadId,body){
    if(!sb)return;
    const {data:c,error}=await sb.from('comments').insert({thread_id:threadId,board:BOARD,author:me.name||'Guest',color:me.color,body}).select().single();
    if(error){toast('Could not post reply');return;}
    upComment(c);renderPanel();refreshPop();
  }
  async function setResolved(id,val){
    const t=threads.get(id);if(t)t.resolved=val;renderPanel();renderPins();refreshPop();
    if(sb)await sb.from('comment_threads').update({resolved:val}).eq('id',id);
  }
  async function removeComment(id){
    const t=delCommentById(id);renderPanel();refreshPop();
    if(sb)await sb.from('comments').delete().eq('id',id);
    if(t&&t.comments.length===0){delThread(t.id);renderPanel();renderPins();if(sb)await sb.from('comment_threads').delete().eq('id',t.id);}
  }
  async function deleteThread(id){
    if(!threads.get(id))return;
    delThread(id);closePop();renderPanel();renderPins();
    if(sb)await sb.from('comment_threads').delete().eq('id',id); // cascade removes its comments
  }

  /* ---------- pins ---------- */
  function activeBody(){return document.querySelector('.screen.active .body');}
  function renderPins(){
    const layer=document.getElementById('cLayer');if(!layer)return;
    if(hidden){layer.innerHTML='';layer.style.display='none';layer.classList.remove('on');return;}
    layer.style.display='';
    layer.classList.toggle('on',mode);
    const scr=curScreen(),showRes=resFilter();
    layer.innerHTML='';
    orderedThreads().forEach(t=>{
      if(t.screen!==scr)return;if(t.resolved&&!showRes)return;
      const n=numberOf(t.id);
      const pin=document.createElement('div');
      pin.className='cpin'+(t.resolved?' res':'')+(selId===t.id?' sel':'');
      pin.dataset.id=t.id;pin.dataset.cy=(t.cy==null?'':t.cy);pin.dataset.y=t.y;
      pin.style.left=t.x+'%';pin.style.background=t.color;
      pin.textContent=n;
      if(t.comments.length>1){const r=document.createElement('span');r.className='rc';r.textContent=t.comments.length;pin.appendChild(r);}
      pin.onclick=ev=>{ev.stopPropagation();openThread(t.id);};
      layer.appendChild(pin);
    });
    bindScroll();positionAll();
  }
  // Position pins: content-anchored pins (cy set) track the screen's scroll; others stick to the viewport.
  function positionAll(){
    const layer=document.getElementById('cLayer');if(!layer)return;
    const body=activeBody(),lr=layer.getBoundingClientRect();
    let bTop=0,bScroll=0,bClient=lr.height,hasBody=false;
    if(body){const br=body.getBoundingClientRect();bTop=br.top-lr.top;bScroll=body.scrollTop;bClient=body.clientHeight;hasBody=true;}
    layer.querySelectorAll('.cpin').forEach(pin=>{
      const cy=pin.dataset.cy;
      if(cy!==''&&cy!=null&&hasBody){
        const top=bTop+(parseFloat(cy)-bScroll);
        pin.style.top=top+'px';
        pin.style.display=(top>=bTop-6&&top<=bTop+bClient+6)?'':'none';
      }else{pin.style.top=(pin.dataset.y||50)+'%';pin.style.display='';}
    });
  }
  let _scrollEl=null,_scrollH=null;
  function bindScroll(){
    const body=activeBody();
    if(body===_scrollEl)return;
    if(_scrollEl&&_scrollH)_scrollEl.removeEventListener('scroll',_scrollH);
    _scrollEl=body;
    if(body){_scrollH=()=>requestAnimationFrame(positionAll);body.addEventListener('scroll',_scrollH,{passive:true});}
  }
  function resFilter(){const c=document.getElementById('showRes');return c?c.checked:false;}

  /* ---------- panel ---------- */
  function renderPanel(){
    const count=[...threads.values()].filter(t=>!t.resolved).length;
    const cb=document.getElementById('cCount');if(cb)cb.textContent=count;
    renderMe();renderThreadList();
  }
  function renderMe(){
    const av=document.getElementById('meAv');if(av){av.textContent=initial(me.name);av.style.background=me.color;}
    const inp=document.getElementById('meName');if(inp&&inp.value!==me.name&&document.activeElement!==inp)inp.value=me.name;
    const sw=document.getElementById('meSwatches');
    if(sw&&!sw.dataset.built){sw.dataset.built='1';sw.innerHTML=PALETTE.map(c=>'<i data-c="'+c+'" style="background:'+c+'"></i>').join('');
      sw.querySelectorAll('i').forEach(i=>i.onclick=()=>{me.color=i.dataset.c;saveMe();renderMe();trackPresence();});}
    if(sw)sw.querySelectorAll('i').forEach(i=>i.classList.toggle('on',i.dataset.c===me.color));

  function renderThreadList(){
    const box=document.getElementById('cthreads');if(!box)return;
    const showRes=resFilter();
    const list=orderedThreads().filter(t=>t.comments.length&&(showRes||!t.resolved))
      .sort((a,b)=>new Date(lastCommentAt(b))-new Date(lastCommentAt(a)));
    if(!list.length){box.innerHTML='<div class="cempty"><b>No comments yet</b>Turn on comment mode and tap anywhere on the prototype to leave the first note.</div>';return;}
    box.innerHTML=list.map(t=>{
      const n=numberOf(t.id),first=t.comments[0],last=t.comments[t.comments.length-1];
      return '<div class="cthread'+(t.resolved?' res':'')+'" onclick="Comments.jumpTo(\''+t.id+'\')">'
        +'<div class="crow"><span class="cpin-mini" style="background:'+t.color+'">'+n+'</span>'
        +'<span class="cwho">'+esc(first.author)+'</span>'
        +'<span class="cmeta">'+ago(lastCommentAt(t))+'</span></div>'
        +'<div class="cbody">'+esc(last.body)+'</div>'
        +'<div><span class="cscreen">◐ '+esc(scrLabel(t.screen))+'</span>'
        +(t.comments.length>1?'<span class="crep">'+t.comments.length+' replies</span>':'')
        +(t.resolved?'<span class="crep" style="color:var(--teal)">resolved</span>':'')+'</div></div>';
    }).join('');
  }
  function renderPresence(){
    const box=document.getElementById('presence');
    const seen={},people=[];
    Object.values(presenceMap).forEach(arr=>arr.forEach(p=>{if(!seen[p.uid]){seen[p.uid]=1;people.push(p);}}));
    const dot=document.getElementById('liveDot');if(dot)dot.classList.toggle('live',people.length>0);
    const shown=people.slice(0,5);
    if(box)box.innerHTML=shown.map(p=>'<span class="pav sm" title="'+esc(p.name||'Guest')+'" style="background:'+(p.color||'#5B4BD6')+'">'+initial(p.name)+'</span>').join('')
      +(people.length>shown.length?'<span class="pmore">+'+(people.length-shown.length)+'</span>':'')
      +(people.length?'<span class="pmore">'+(people.length===1?'just you':people.length+' here')+'</span>':'');
    // live viewers card — name · IP · current page
    const vn=document.getElementById('vnow');if(vn)vn.textContent=people.length;
    const vl=document.getElementById('vlist');
    if(vl)vl.innerHTML=people.map(p=>
      '<div class="vrow"><span class="vdot" style="background:'+(p.color||'#5B4BD6')+'"></span>'
      +'<div class="vmeta"><span class="vname">'+esc(p.name||'Guest')+(p.uid===uid?' (you)':'')+'</span>'
      +'<span class="vsub">'+esc(p.ip||'resolving IP…')+' · on <span class="vpg">'+esc(scrLabel(p.at))+'</span></span></div></div>'
    ).join('');
  }

  /* ---------- mode ---------- */
  function toggleMode(force){
    mode=(typeof force==='boolean')?force:!mode;
    if(mode&&hidden)toggleHide(false);   // entering comment mode reveals pins
    const b=document.getElementById('cmodeBtn');if(b)b.classList.toggle('on',mode);
    const lbl=document.getElementById('cmodeLbl');if(lbl)lbl.textContent=mode?'Placing comment — tap the screen':'Comment mode';
    renderPins();
  }
  function toggleHide(force){
    hidden=(typeof force==='boolean')?force:!hidden;
    if(hidden&&mode)toggleMode(false);
    const b=document.getElementById('hideBtn');if(b)b.classList.toggle('on',hidden);
    const lbl=document.getElementById('hideLbl');if(lbl)lbl.textContent=hidden?'Show comments':'Hide comments';
    if(hidden&&popEl)closePop();
    renderPins();
  }

  /* ---------- popover ---------- */
  function closePop(){if(popEl){popEl.remove();popEl=null;}selId=null;popAnchor=null;renderPins();}
  function pinClientAnchor(id){const p=document.querySelector('.cpin[data-id="'+id+'"]');if(!p)return null;const r=p.getBoundingClientRect();return{x:r.right-4,y:r.top+6};}
  function position(){if(!popEl||!popAnchor)return;const w=popEl.offsetWidth,h=popEl.offsetHeight;let L=popAnchor.x+16,T=popAnchor.y-24;
    if(L+w>innerWidth-12)L=popAnchor.x-w-16;if(L<12)L=12;if(T+h>innerHeight-12)T=innerHeight-12-h;if(T<12)T=12;
    popEl.style.left=L+'px';popEl.style.top=T+'px';}

  function openThread(id){
    const t=threads.get(id);if(!t)return;
    selId=id;popAnchor=pinClientAnchor(id)||{x:innerWidth/2,y:innerHeight/2};
    buildPop({mode:'thread'});renderPins();
  }
  function openComposer(x,y,screen,anchor,cy){
    selId='__new';popAnchor=anchor;buildPop({mode:'new',x,y,screen,cy});
  }
  function buildPop(o){
    if(popEl)popEl.remove();
    popEl=document.createElement('div');popEl.className='cpop';
    const isNew=o.mode==='new';
    const t=isNew?null:threads.get(selId);
    const num=isNew?orderedThreads().length+1:numberOf(selId);
    const col=isNew?me.color:t.color;
    const screen=isNew?o.screen:t.screen;
    const needName=!me.name.trim();
    popEl.innerHTML=
      '<div class="ph"><span class="pn" style="background:'+col+'">'+num+'</span>'
      +'<span class="pscr">'+esc(scrLabel(screen))+'</span>'
      +(isNew?'':'<button class="'+(t.resolved?'act':'')+'" title="'+(t.resolved?'Reopen':'Resolve')+'" onclick="Comments.resolve(\''+selId+'\','+(!t.resolved)+')"><svg width="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>')
      +(isNew?'':'<button class="delthr" title="Delete this whole thread" onclick="Comments.delThread(\''+selId+'\')"><svg width="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>')
      +'<button title="Close" onclick="Comments.closePop()"><svg width="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button></div>'
      +(!isNew&&t.resolved?'<div class="cresolved-tag">Resolved ✓ — reopen from the check above</div>':'')
      +'<div class="plist" id="popList"></div>'
      +'<div class="pf">'
      +(needName?'<input class="nameq" id="popName" placeholder="Your name" maxlength="24" value="'+esc(me.name)+'">':'')
      +'<div class="pfrow"><textarea id="popInput" rows="1" placeholder="'+(isNew?'Add a comment…':'Reply…')+'"></textarea>'
      +'<button class="send" id="popSend" disabled><svg width="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"/></svg></button></div></div>';
    document.body.appendChild(popEl);
    popEl._ctx=o;
    renderPopList();
    const ta=popEl.querySelector('#popInput'),send=popEl.querySelector('#popSend'),nm=popEl.querySelector('#popName');
    const sync=()=>{send.disabled=!ta.value.trim()||(nm&&!nm.value.trim());};
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,96)+'px';sync();});
    if(nm)nm.addEventListener('input',sync);
    ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!send.disabled)submit();}});
    send.onclick=submit;
    requestAnimationFrame(()=>{position();ta.focus();});
    function submit(){
      const body=ta.value.trim();if(!body)return;
      if(nm){const nv=nm.value.trim();if(!nv){nm.focus();return;}me.name=nv;saveMe();renderMe();trackPresence();}
      ta.value='';ta.style.height='auto';send.disabled=true;
      if(isNew){const x=o.x,y=o.y,scr=o.screen,cy=o.cy;closePop();createThread(x,y,scr,body,cy).then(id=>{if(id)openThread(id);});}
      else addReply(selId,body);
    }
  }
  function renderPopList(){
    const box=popEl&&popEl.querySelector('#popList');if(!box)return;
    const o=popEl._ctx;
    if(o.mode==='new'){box.innerHTML='<div class="pc" style="color:var(--ink-3);font-size:12.5px;padding:16px 14px">Drop your first note here — everyone reviewing sees it live.</div>';return;}
    const t=threads.get(selId);if(!t)return;
    box.innerHTML=t.comments.map(c=>
      '<div class="pc"><span class="av" style="background:'+c.color+'">'+initial(c.author)+'</span>'
      +'<div style="flex:1;min-width:0"><div><span class="pcwho">'+esc(c.author)+'</span><span class="pctime">'+ago(c.created_at)+'</span>'
      +'<button class="del" onclick="Comments.del(\''+c.id+'\')">delete</button></div>'
      +'<div class="pctext">'+esc(c.body)+'</div></div></div>').join('');
  }
  function refreshPop(){
    if(!popEl||selId==='__new')return;
    if(!threads.get(selId)){closePop();return;}
    const o=popEl._ctx,t=threads.get(selId);
    const tag=popEl.querySelector('.cresolved-tag');
    const rb=popEl.querySelector('.ph button');
    if(rb){rb.classList.toggle('act',t.resolved);rb.title=t.resolved?'Reopen':'Resolve';rb.setAttribute('onclick',"Comments.resolve('"+selId+"',"+(!t.resolved)+")");}
    renderPopList();position();
  }

  /* ---------- nav / placement ---------- */
  function onNav(){renderPins();if(popEl){if(selId==='__new'||(threads.get(selId)&&threads.get(selId).screen!==curScreen()))closePop();else position();}trackPresence();touchView();}
  function placeAt(e){
    if(!mode)return;
    const layer=document.getElementById('cLayer'),r=layer.getBoundingClientRect();
    const x=Math.max(2,Math.min(98,(e.clientX-r.left)/r.width*100));
    const y=Math.max(3,Math.min(97,(e.clientY-r.top)/r.height*100));
    // If the tap lands inside the scrollable content, anchor it to the content (scrolls with the page);
    // taps on fixed chrome (tab bar, CTA dock, status bar) stay pinned to the viewport.
    let cy=null;const body=activeBody();
    if(body){const br=body.getBoundingClientRect();
      if(e.clientY>=br.top&&e.clientY<=br.bottom)cy=+((e.clientY-br.top)+body.scrollTop).toFixed(1);}
    toggleMode(false);
    openComposer(+x.toFixed(2),+y.toFixed(2),curScreen(),{x:e.clientX,y:e.clientY},cy);
  }

  /* ---------- share ---------- */
  function share(){
    const url=location.href;
    const done=()=>{const b=document.getElementById('shareBtn');if(b){const o=b.textContent;b.textContent='Link copied ✓';setTimeout(()=>b.textContent=o,1600);}toast('Review link copied — share it to collect comments');};
    if(navigator.clipboard&&location.protocol!=='file:')navigator.clipboard.writeText(url).then(done,()=>fallback(url,done));else fallback(url,done);
  }
  function fallback(url,done){const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');done();}catch(e){toast('Copy this link: '+url);}ta.remove();}

  /* ---------- bind ---------- */
  function bindUI(){
    const layer=document.getElementById('cLayer');if(layer)layer.addEventListener('click',placeAt);
    const nm=document.getElementById('meName');
    if(nm){nm.value=me.name;nm.addEventListener('input',()=>{me.name=nm.value;saveMe();renderMe();});nm.addEventListener('change',trackPresence);}
    window.addEventListener('keydown',e=>{
      const tag=(e.target.tagName||'').toLowerCase();if(tag==='input'||tag==='textarea')return;
      if(e.key==='c'||e.key==='C'){toggleMode();}
      else if(e.key==='h'||e.key==='H'){toggleHide();}
      else if(e.key==='Escape'){if(popEl)closePop();else if(mode)toggleMode(false);}
    });
    setInterval(()=>{if(threads.size)renderThreadList();},30000);
  }

  // wrap navigation so pins follow the current screen
  const _render=window.render;
  window.render=function(){const r=_render.apply(this,arguments);try{onNav();}catch(e){}return r;};

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();

  return {toggleMode,toggleHide,share,render:renderPanel,jumpTo,resolve:setResolved,del:removeComment,delThread:deleteThread,closePop,_state:()=>threads};

  function jumpTo(id){
    const t=threads.get(id);if(!t)return;
    if(t.screen===curScreen()){openThread(id);return;}
    try{if(t.screen.indexOf('tab-')===0)switchTab(t.screen.slice(4));else go(t.screen);}catch(e){}
    setTimeout(()=>{renderPins();openThread(id);},80);
  }
})();
</script>
</body>
